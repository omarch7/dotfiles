unbind r

bind r source-file ~/.tmux.conf
set -g prefix C-s

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g mouse off
set -g focus-events on
set -g allow-passthrough on
set -g extended-keys on
set -g extended-keys-format csi-u

set-window-option -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind '"' split-window -c "#{pane_current_path}" -v
bind % split-window -c "#{pane_current_path}" -h

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'wfxr/tmux-fzf-url'

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @plugin 'tmux-plugins/tpm'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @plugin 'sainnhe/tmux-fzf'

# Load catppuccin then detect system theme (light/dark)
run ~/.tmux/plugins/tmux/catppuccin.tmux
run ~/.tmux/scripts/detect-theme.sh

# Re-detect theme when a client attaches or regains focus
set-hook -g client-focus-in 'run ~/.tmux/scripts/detect-theme.sh'

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100

set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"

set -g status-left ""
source ~/.tmux/scripts/status.conf

set -g @catppuccin_status_modules_right "application cpu session uptime battery"
#set -g @catppuccin_status_modules_left "window"

# Initialise TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
