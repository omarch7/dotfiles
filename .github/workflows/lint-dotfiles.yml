name: Lint Dotfiles

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Lua
      uses: leafo/gh-actions-lua@v8
      with:
        luaVersion: '5.1'

    - name: Install luacheck
      run: luarocks install luacheck

    - name: Run luacheck
      run: luacheck nvim/lua
