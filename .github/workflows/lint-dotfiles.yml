name: Lint Dotfiles

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Lua
      uses: xpol/setup-lua@v0.3
      with:
        lua-version: "5.1"
        luarocks-version: "3.9.2"

    - name: Install luacheck
      run: luarocks install luacheck

    - name: Run luacheck
      run: luacheck nvim/lua
